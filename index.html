<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numerix // Trilha das Estrelas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>

    <div class="container py-5 d-flex justify-content-center">
        <div class="w-100" style="max-width:640px;">
            <header class="text-center mb-4">
                <h1 class="titulo-projeto m-0">Numerix</h1>
                <p class="subtitle mb-1">Sua missão: combine os números até chegar no 10!</p>
                <button class="btn btn-sm btn-outline-secondary" data-bs-toggle="modal" data-bs-target="#dicaModal">
                    <i class="bi bi-question-circle"></i> Como jogar?
                </button>
            </header>

            <section class="card card-numerix p-4 p-md-5">
                <p class="meta-label text-center mb-4">Meta: chegar exatamente em 10</p>
                <div class="d-flex justify-content-center mb-2">
                    <svg class="mascote" id="mascote" viewBox="0 0 100 100">
                        <polygon points="50,5 61,37 96,37 68,58 79,90 50,70 21,90 32,58 4,37 39,37" fill="#e0a541"
                            stroke="#b9822f" stroke-width="2" />
                        <circle cx="40" cy="47" r="4" fill="#1f2937" />
                        <circle cx="62" cy="47" r="4" fill="#1f2937" />
                        <path id="mascote-boca" d="M 38 60 Q 50 66 64 60" stroke="#1f2937" stroke-width="3.5"
                            fill="none" stroke-linecap="round" />
                    </svg>
                </div>
                <div class="d-flex flex-wrap justify-content-center gap-2 my-4" id="trilha"></div>
                <div class="d-flex justify-content-center mb-3">
                    <div class="total-box rounded-circle d-flex align-items-center justify-content-center"><span
                            id="total-numero">0</span></div>
                </div>
                <p class="feedback text-center mb-4" id="feedback-label">Pronto para começar?</p>
                <div class="row g-3">
                    <div class="col-6 col-sm-3"><button class="btn btn-num w-100" id="btn-1" onclick="addValue(1)"><span
                                class="stars"><i class="bi bi-star-fill"></i></span><br><span
                                class="num">+1</span></button></div>
                    <div class="col-6 col-sm-3"><button class="btn btn-num w-100" id="btn-2" onclick="addValue(2)"><span
                                class="stars"><i class="bi bi-star-fill"></i><i
                                    class="bi bi-star-fill"></i></span><br><span class="num">+2</span></button></div>
                    <div class="col-6 col-sm-3"><button class="btn btn-num w-100" id="btn-3" onclick="addValue(3)"><span
                                class="stars"><i class="bi bi-star-fill"></i><i class="bi bi-star-fill"></i><i
                                    class="bi bi-star-fill"></i></span><br><span class="num">+3</span></button></div>
                    <div class="col-6 col-sm-3"><button class="btn btn-num w-100" id="btn-5" onclick="addValue(5)"><span
                                class="stars"><i class="bi bi-star-fill"></i><i class="bi bi-star-fill"></i><i
                                    class="bi bi-star-fill"></i><i class="bi bi-star-fill"></i><i
                                    class="bi bi-star-fill"></i></span><br><span class="num">+5</span></button></div>
                </div>
                <button class="btn btn-reset w-100 mt-4" onclick="resetGame()">Recomeçar</button>
            </section>
        </div>
    </div>

    <div class="modal fade" id="dicaModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content p-4 text-center">
                <h5 class="modal-title mb-3">Como jogar?</h5>
                <p>O seu objetivo é somar os números até atingir <strong>exatamente 10</strong>. Se a sua soma
                    ultrapassar o 10, você deverá recomeçar o desafio!</p>
                <button type="button" class="btn btn-success mt-2" data-bs-dismiss="modal">Entendi, vamos lá!</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/script.js"></script>

</body>
</html>
